# #####################################################################
# HYPRLAND CONFIGURATION - SYSTEM ARCHITECTURE
# #####################################################################

# --- Variables ---
$mainMod    = SUPER
$terminal   = kitty
$fileManager = dolphin
$menu       = wofi --show drun

# --- Monitors ---
monitor = DP-1, 1920x1080@100, 0x0, 1
monitor = eDP-1, 2560x1600@165, 0x1080, 1.25

# --- Startup ---
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar

# --- Input Configuration ---
input {
    kb_layout    = pt
    follow_mouse = 1
    
    touchpad {
        natural_scroll = true
    }

    sensitivity = 0 
}

# --- Keybindings ---
# Application Launchers
bind = $mainMod, A, exec, pkill wofi || $menu
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager

# Window Management
bind = $mainMod, Q, killactive,
bind = $mainMod, V, togglefloating,

# Focus Movement
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Window Movement
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# System Controls
bind = SUPER SHIFT, W, exec, pkill waybar && waybar
bind = $mainMod SHIFT, P, exec, poweroff