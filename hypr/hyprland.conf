# #####################################################################
# HYPRLAND CONFIGURATION
# Optimized for Nvidia + Intel Hybrid Graphics
# #####################################################################

# ---------------------------------------------------------------------
# 1. MAIN APPLICATIONS & VARIABLES
# ---------------------------------------------------------------------
$mainMod      = SUPER
$terminal     = kitty
$fileManager  = dolphin
$menu         = rofi -show drun
$scriptDir    = ~/.config/hypr/scripts

# ---------------------------------------------------------------------
# 2. ENVIRONMENT VARIABLES (WAYLAND, NVIDIA & TOOLKITS)
# ---------------------------------------------------------------------
# XDG Specifications
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# NVIDIA Specific Requirements (Essential for Hybrid setups)
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

# Toolkit Backends (Force Wayland, fallback to X11)
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct # Change to qt6ct if using Qt6

# Application Specific Fixes
env = _JAVA_AWT_WM_NONREPARENTING,1 # Fixes blank/grey windows in Java apps
env = MOZ_ENABLE_WAYLAND,1          # Hardware acceleration in Firefox
env = ELECTRON_OZONE_PLATFORM_HINT,auto # Native Wayland for VS Code, Discord, etc.

# ---------------------------------------------------------------------
# 3. MONITORS
# ---------------------------------------------------------------------
# DP-1: external monitor
# eDP-1: laptop display
monitor = DP-1, 1920x1080@100, 0x0, 1
monitor = eDP-1, 2560x1600@165, 0x1080, 1.25

# ---------------------------------------------------------------------
# 4. AUTOSTART
# ---------------------------------------------------------------------
exec-once = awww-daemon & sleep 1 && awww img /home/leandro/Pictures/gradient.png --transition-type wipe
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = firefox
exec-once = hypridle

# ---------------------------------------------------------------------
# 5. INPUT & CURSOR
# ---------------------------------------------------------------------
input {
    kb_layout = pt
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

cursor {
    # CRITICAL FOR NVIDIA: Prevents the invisible cursor bug
    no_hardware_cursors = true
}

# ---------------------------------------------------------------------
# 6. XWAYLAND & SCALING FIXES
# ---------------------------------------------------------------------
# Prevents blurriness and focus issues on scaled displays (eDP-1)
xwayland {
    force_zero_scaling = true
}

# ---------------------------------------------------------------------
# 7. ANIMATIONS
# ---------------------------------------------------------------------
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = specialWorkspace, 1, 6, myBezier, slidevert
}

# ---------------------------------------------------------------------
# 8. KEYBINDINGS
# ---------------------------------------------------------------------

# --- Core Applications ---
bind = $mainMod, A, exec, pkill rofi || $menu
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, firefox
bind = $mainMod, Q, killactive,
bind = $mainMod, V, togglefloating,

# --- Power Actions ---
bind = $mainMod CTRL, P, exec, poweroff
bind = $mainMod CTRL, R, exec, reboot
bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod CTRL, S, exec, systemctl suspend

# --- Screenshots ---
# SUPER + SHIFT + S: select area and copy to clipboard
# Print: capture active monitor and save to Pictures
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, mkdir -p ~/Pictures/Screenshots && grim -o "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true) | .name')" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png

# --- Focus Movement ---
bind = $mainMod, RIGHT, exec, $scriptDir/focus.sh right
bind = $mainMod, LEFT,  exec, $scriptDir/focus.sh left
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Window Movement ---
bind = $mainMod SHIFT, RIGHT, exec, $scriptDir/window.sh right
bind = $mainMod SHIFT, LEFT,  exec, $scriptDir/window.sh left
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Mouse Bindings ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Scratchpad ---
bind = $mainMod, S, togglespecialworkspace, scratchpad
bind = $mainMod ALT, S, movetoworkspace, special:scratchpad

# --- Media & Hardware Keys ---
bindle=, XF86AudioRaiseVolume, exec, pamixer -i 2
bindle=, XF86AudioLowerVolume, exec, pamixer -d 2
bindl =, XF86AudioMute, exec, pamixer -t
bindl =, XF86AudioMicMute, exec, pamixer --default-source -t
bindle=, XF86MonBrightnessUp, exec, brightnessctl set +5%
bindle=, XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl =, XF86AudioPlay, exec, playerctl play-pause
bindl =, XF86AudioNext, exec, playerctl next
bindl =, XF86AudioPrev, exec, playerctl previous

# ---------------------------------------------------------------------
# 9. WORKSPACES
# ---------------------------------------------------------------------

# --- Pinned Workspaces to Monitors ---
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1

# --- Switch Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move Windows to Workspaces ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10